<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grosmen Store | قيد الصيانة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #888; --glass: rgba(255, 255, 255, 0.05); }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: var(--glass);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .icon { font-size: 4rem; color: var(--accent); margin-bottom: 1.5rem; }
        h1 { margin: 0; font-size: 2rem; color: #fff; }
        p { color: #bbb; margin: 1rem 0 2rem; }
        .btn {
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover { background: var(--accent); color: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fa-solid fa-gears"></i></div>
        <h1>Grosmen Store</h1>
        <p>هذه الصفحة قيد الصيانة حالياً لتنفيذ التوسعة الشاملة.</p>
        <a href="https://bacmaroc.ivanova.sbs" class="btn">انتقل إلى BacMaroc</a>
    </div>
</body>
</html>
